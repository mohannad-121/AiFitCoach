version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: fitcoach-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 10

  backend:
    build:
      context: ../ai_backend
      dockerfile: Dockerfile
    container_name: fitcoach-backend
    restart: unless-stopped
    depends_on:
      - ollama
    ports:
      - "8000:8000"
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      CHAT_RESPONSE_MODE: llm
      LLM_PROVIDER: ollama
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: qwen3:8b
      OLLAMA_TIMEOUT_SECONDS: 180
      TRAINING_PIPELINE_ENABLED: "1"
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}

volumes:
  ollama-data: