services:
  - type: web
    name: fit-coach-ai-backend
    env: docker
    dockerfilePath: ./ai_backend/Dockerfile
    dockerContext: ./ai_backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8000"
      - key: API_HOST
        value: 0.0.0.0
      - key: API_PORT
        value: "8000"
      - key: CHAT_RESPONSE_MODE
        value: dataset_only
      - key: TRAINING_PIPELINE_ENABLED
        value: "0"
      - key: OLLAMA_MODEL
        value: llama3.2:3b
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false

  - type: static
    name: fit-coach-ai-frontend
    rootDir: .
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_AI_BACKEND_URL
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false